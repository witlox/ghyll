coverage:
  precision: 2
  round: down
  range: "50...100"
  status:
    project:
      default:
        target: 50%
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 60%
        threshold: 5%
        if_ci_failed: error

flags:
  unittests:
    paths:
      - config/
      - types/
      - tool/
      - stream/
      - dialect/
      - memory/
      - context/
      - vault/
      - cmd/
    carryforward: true

ignore:
  - tests/**/*
  - docs/**/*
  - scripts/**/*
  - "**/*_test.go"
