pre-commit:
  parallel: false
  commands:
    fmt:
      glob: "*.go"
      run: gofmt -l -w {staged_files}
      stage_fixed: true
    lint:
      glob: "*.go"
      run: golangci-lint run --timeout=5m
    test:
      run: make test
    vet:
      glob: "*.go"
      run: go vet ./...

pre-push:
  parallel: true
  commands:
    build:
      run: go build ./...
