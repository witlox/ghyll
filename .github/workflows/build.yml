name: Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - run: go mod download

      - run: go build -v ./...

      - name: Build binaries
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=ci" -o bin/ghyll ./cmd/ghyll
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=ci" -o bin/ghyll-vault ./cmd/ghyll-vault

      - uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: bin/
          retention-days: 7
