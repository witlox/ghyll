name: Release

on:
  schedule:
    - cron: "0 2 * * 0" # Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for new commits since last tag
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            COMMITS=$(git rev-list "${LAST_TAG}..HEAD" --count)
            if [ "$COMMITS" -gt 0 ]; then
              echo "has_updates=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_updates=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate version
        id: version
        run: |
          YEAR=$(date +%Y)
          MAJOR=1
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="${YEAR}.${MAJOR}.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Generated version: ${VERSION}"

  release:
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install zig (cross-compiler for CGO)
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Create tag
        run: |
          VERSION="${{ needs.check-updates.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

