name: Test

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests with coverage
        run: |
          go test -v -race -count=1 -coverprofile=unit.out \
            -coverpkg=./config/...,./types/...,./tool/...,./stream/...,./dialect/...,./memory/...,./context/...,./vault/... \
            ./config/... ./types/... ./tool/... ./stream/... ./dialect/... ./memory/... ./context/... ./vault/...

      - name: Run session tests with coverage
        run: |
          go test -v -race -count=1 -coverprofile=session.out \
            ./cmd/ghyll/...

      - name: Run acceptance tests
        run: |
          go test -v -count=1 ./tests/acceptance/...

      - name: Merge coverage
        run: |
          go install github.com/wadey/gocovmerge@latest
          gocovmerge unit.out session.out > coverage.txt

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt
          retention-days: 7

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 50% threshold"
            exit 1
          fi
